<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Gráfico de Lesões</h2>
<canvas id="grafico"></canvas>

<script>
fetch("http://127.0.0.1:5000/dados")
.then(res => res.json())
.then(data => {

    let labels = data.map(item => item[0])
    let valores = data.map(item => item[1])

    new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Casos",
                data: valores
            }]
        }
    })
})
</script>

</body>
</html>
