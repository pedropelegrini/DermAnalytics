<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DermAnalytics</title>
</head>
<body>

<main>
    <h1>DermAnalytics</h1>
    <h2>Cadastro Dermatológico</h2>

    <form onsubmit="cadastrar(event)" aria-label="Formulário de cadastro dermatológico">
        <label for="idade">Idade</label><br>
        <input id="idade" type="number" min="0" required aria-label="Idade do paciente"><br><br>

        <label for="sexo">Sexo</label><br>
        <select id="sexo" required aria-label="Sexo do paciente">
            <option value="">Selecione</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
            <option value="Outro">Outro</option>
        </select><br><br>

        <label for="lesao">Tipo de lesão</label><br>
        <input id="lesao" type="text" required aria-label="Tipo de lesão dermatológica"><br><br>

        <label for="regiao">Região do corpo</label><br>
        <input id="regiao" type="text" required aria-label="Região do corpo"><br><br>

        <label for="data">Data do diagnóstico</label><br>
        <input id="data" type="date" required aria-label="Data do diagnóstico"><br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <p>
        <a href="dashboard.html">Ver dashboard</a>
    </p>
</main>

<script src="script.js"></script>

</body>
</html>
